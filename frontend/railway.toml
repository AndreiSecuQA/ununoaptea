# Railway service config — frontend (Vite + nginx static).
# Setează "Root Directory" = frontend în Railway service settings.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand — let the Dockerfile CMD (/docker-entrypoint-railway.sh)
# run so it can sed-substitute ${PORT} into the nginx config first.
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1
